services:
  kali:
    build:
      context: .
      dockerfile_inline: |
        FROM kalilinux/kali-rolling:latest
        ENV DEBIAN_FRONTEND=noninteractive
        RUN apt-get update && apt-get install -y --no-install-recommends \
            curl wget git python3 python3-pip \
            nmap netcat-openbsd whois dnsutils jq \
            && rm -rf /var/lib/apt/lists/*
        RUN pip3 install --break-system-packages \
            playwright playwright-stealth browser-use \
            && playwright install chromium --with-deps
        RUN curl -fsSL https://opencode.ai/install | bash
        WORKDIR /root/workspace
        EXPOSE 4096
    container_name: kali-opencode
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "4096:4096"
    environment:
      - OPENCODE_ENABLE_EXA=1
    volumes:
      - ./workspace:/root/workspace
      - opencode-data:/root/.local/share/opencode
    command: /root/.opencode/bin/opencode web --port 4096 --hostname 0.0.0.0

volumes:
  opencode-data: