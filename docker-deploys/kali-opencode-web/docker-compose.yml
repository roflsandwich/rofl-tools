services:
  kali:
    build:
      context: .
      dockerfile_inline: |
        FROM kalilinux/kali-rolling:latest
        ENV DEBIAN_FRONTEND=noninteractive
        RUN apt-get update && apt-get install -y \
            curl wget git unzip build-essential \
            python3 python3-pip nodejs npm \
            nmap netcat-openbsd whois dnsutils \
            net-tools iputils-ping vim nano tmux jq \
            && apt-get clean && rm -rf /var/lib/apt/lists/*
        RUN pip3 install --break-system-packages \
            playwright \
            playwright-stealth \
            browser-use
        RUN playwright install chromium --with-deps
        RUN curl -fsSL https://opencode.ai/install | bash
        ENV PATH="/root/.opencode/bin:${PATH}"
        WORKDIR /root/workspace
        EXPOSE 4096
        COPY INSTRUCTIONS.md /root/instructions.md
        CMD cp -n /root/instructions.md /root/workspace/INSTRUCTIONS.md && \
            cd /root/workspace && opencode web --port 4096 --hostname 0.0.0.0
    container_name: kali-opencode
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "4096:4096"
    volumes:
      - ./workspace:/root/workspace
      - ./opencode-data:/root/.local/share/opencode
      - ./opencode-config:/root/.config/opencode
      - ./opencode-settings:/root/.opencode
